<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in — Eat.</title>
<meta name="description" content="Sign in to your Eat account to manage your plan and subscription. One account across the app and the web." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #fdf8f2; --bg-warm: #f7f0e6; --surface: #ffffff;
    --border: #e8ddd0; --border-2: #ddd0be;
    --brand: #ff6b35; --text-dark: #2d1f0e; --text-mid: #5c3d1e; --muted: #9c8572;
    --green: #2f9e5f;
    --font-serif: "DM Serif Display","Times New Roman",serif;
    --font-sans: "DM Sans",-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text-dark);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;min-height:100dvh;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--brand);color:#fff}

  .nav{position:sticky;top:0;z-index:50;background:rgba(253,248,242,0.88);backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);border-bottom:1px solid var(--border)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:72px;max-width:1240px;margin:0 auto;padding:0 32px}
  .brand{display:inline-flex;align-items:center;gap:12px}
  .brand-mark{width:36px;height:36px;border-radius:9px;background:radial-gradient(circle at 30% 25%,#ffb088 0%,#ff6b35 55%,#e25420 100%);box-shadow:0 6px 16px rgba(255,107,53,.32),0 0 0 1px rgba(0,0,0,.04);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden}
  .brand-mark::after{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.28) 0%,transparent 35%)}
  .brand-mark span{position:relative;z-index:1;font-family:var(--font-serif);font-style:italic;font-weight:700;color:#fffaf3;font-size:30px;line-height:1;letter-spacing:-.04em;text-shadow:0 2px 8px rgba(120,40,10,.28);transform:translate(0,-1px)}
  .nav-links{display:flex;align-items:center;gap:30px;font-size:15px;font-weight:500}
  .nav-links a:hover{color:var(--brand)}
  .nav-cta{background:var(--text-dark);color:#fdf8f2 !important;display:inline-flex;align-items:center;height:40px;padding:0 18px;border-radius:14px;font-weight:500;font-size:14px;box-shadow:0 4px 14px rgba(45,31,14,.18)}
  @media(max-width:720px){.nav-links a:not(.nav-cta){display:none}.nav-inner{padding:0 22px}}

  .main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
  .card{width:100%;max-width:430px;background:var(--surface);border:1px solid var(--border);border-radius:30px;padding:40px 38px 32px;text-align:center;box-shadow:0 2px 8px rgba(45,31,14,.06),0 30px 60px -40px rgba(45,31,14,.4)}
  .glow{position:relative;width:66px;height:66px;margin:0 auto 18px}
  .glow::before{content:"";position:absolute;inset:-28%;background:radial-gradient(circle,rgba(255,107,53,.34),transparent 68%);filter:blur(6px)}
  .glow .brand-mark{width:66px;height:66px;border-radius:17px;position:relative}
  .glow .brand-mark span{font-size:52px}
  h1{font-family:var(--font-serif);font-weight:400;font-size:30px;letter-spacing:-.01em;margin:0}
  h1 em{font-style:italic;color:var(--brand)}
  .sub{color:var(--muted);font-size:14.5px;line-height:1.55;margin:9px auto 0;max-width:32ch}

  .tabs{display:flex;gap:6px;background:var(--bg-warm);border:1px solid var(--border);border-radius:13px;padding:4px;margin:24px 0 4px}
  .tabs button{flex:1;height:38px;border:0;border-radius:9px;background:transparent;font-family:var(--font-sans);font-weight:600;font-size:14px;color:var(--text-mid);cursor:pointer;transition:background .15s,color .15s,box-shadow .15s}
  .tabs button.on{background:var(--surface);color:var(--text-dark);box-shadow:0 1px 3px rgba(45,31,14,.12)}

  form{margin-top:18px;text-align:left}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--text-mid);margin:0 0 7px}
  .field{margin-bottom:14px}
  .input{width:100%;height:50px;padding:0 15px;border:1.5px solid var(--border);border-radius:13px;background:var(--surface);font-family:var(--font-sans);font-size:15px;color:var(--text-dark);transition:border-color .15s,box-shadow .15s}
  .input::placeholder{color:#bcae9d}
  .input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(255,107,53,.13)}
  .row-between{display:flex;justify-content:flex-end;margin:-4px 0 4px}
  .link{color:var(--brand);font-weight:600;font-size:12.5px;cursor:pointer;background:none;border:0;padding:0;font-family:var(--font-sans)}
  .btn{width:100%;height:52px;margin-top:8px;border:0;border-radius:14px;background:linear-gradient(140deg,var(--brand),#ff7d44);color:#fff;font-family:var(--font-sans);font-weight:600;font-size:16px;cursor:pointer;box-shadow:0 4px 16px rgba(255,107,53,.35);transition:transform .15s,opacity .15s}
  .btn:hover{transform:translateY(-1px)}
  .btn:disabled{opacity:.6;cursor:default;transform:none}

  .or{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted);font-size:12px}
  .or::before,.or::after{content:"";flex:1;height:1px;background:var(--border)}
  .btn-oauth{width:100%;height:50px;border:1.5px solid var(--border);border-radius:13px;background:var(--surface);color:var(--text-dark);font-family:var(--font-sans);font-weight:600;font-size:14.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .15s,background .15s}
  .btn-oauth:hover{border-color:var(--border-2);background:var(--bg-warm)}
  .btn-oauth svg{flex-shrink:0}

  .msg{font-size:13px;margin-top:14px;text-align:center;line-height:1.5;min-height:16px}
  .msg.ok{color:var(--green)}
  .msg.err{color:#d24b32}
  .foot{display:flex;gap:18px;justify-content:center;margin-top:22px;padding-top:18px;border-top:1px solid var(--border);font-size:12.5px;color:var(--muted)}
  .legal{font-size:11.5px;color:var(--muted);margin:16px auto 0;line-height:1.5;max-width:34ch}
  .legal a{color:var(--brand);font-weight:600}
  @media(max-width:480px){.card{padding:32px 22px 26px}h1{font-size:26px}}
</style>
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="index.html"><span class="brand-mark"><span>e.</span></span></a>
      <nav class="nav-links">
        <a href="pricing.html">Pricing</a>
        <a href="faq.html">FAQ</a>
        <a href="checkout.html" class="nav-cta">Get Eat</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="card">
      <div class="glow"><span class="brand-mark"><span>e.</span></span></div>
      <h1 id="title">Welcome <em>back.</em></h1>
      <p class="sub" id="subtitle">Sign in to manage your plan and subscription.</p>

      <div class="tabs">
        <button id="tab-in" class="on" type="button">Sign in</button>
        <button id="tab-up" type="button">Create account</button>
      </div>

      <form id="form" novalidate>
        <div class="field" id="name-field" style="display:none">
          <label for="name">Name</label>
          <input class="input" type="text" id="name" autocomplete="name" placeholder="Your name"/>
        </div>
        <div class="field">
          <label for="email">Email address</label>
          <input class="input" type="email" id="email" autocomplete="email" placeholder="you@email.com"/>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input class="input" type="password" id="password" autocomplete="current-password" placeholder="••••••••"/>
        </div>
        <div class="row-between" id="forgot-row">
          <button type="button" class="link" id="forgot">Forgot password?</button>
        </div>
        <button type="submit" class="btn" id="submit">Sign in</button>
      </form>

      <div class="or">or</div>
      <button type="button" class="btn-oauth" id="google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571.001-.001 6.19 5.238 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
        Continue with Google
      </button>

      <div class="msg" id="msg"></div>
      <p class="legal">By continuing you agree to Eat's <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a>.</p>
      <div class="foot"><a href="pricing.html">Pricing</a><a href="support.html">Help</a></div>
    </div>
  </main>

  <script type="module">
    import { auth, googleProvider } from "./firebase-init.js";
    import {
      signInWithEmailAndPassword, createUserWithEmailAndPassword,
      signInWithPopup, sendPasswordResetEmail, updateProfile, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

    const $ = id => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    const next = params.get("next") || "account.html";
    let mode = params.get("mode") === "signup" ? "up" : "in";

    // If already signed in, skip straight to the destination.
    onAuthStateChanged(auth, (user) => { if (user) location.replace(next); });

    function render() {
      const up = mode === "up";
      $("tab-in").classList.toggle("on", !up);
      $("tab-up").classList.toggle("on", up);
      $("name-field").style.display = up ? "" : "none";
      $("forgot-row").style.display = up ? "none" : "";
      $("title").innerHTML = up ? "Create your <em>account.</em>" : "Welcome <em>back.</em>";
      $("subtitle").textContent = up ? "One account for the app and the web." : "Sign in to manage your plan and subscription.";
      $("submit").textContent = up ? "Create account" : "Sign in";
      $("password").autocomplete = up ? "new-password" : "current-password";
      msg("");
    }
    function msg(t, ok) { const m = $("msg"); m.className = "msg" + (t ? (ok ? " ok" : " err") : ""); m.textContent = t; }
    $("tab-in").onclick = () => { mode = "in"; render(); };
    $("tab-up").onclick = () => { mode = "up"; render(); };

    const friendly = (code) => ({
      "auth/invalid-email": "That email doesn't look right.",
      "auth/missing-password": "Please enter your password.",
      "auth/weak-password": "Password must be at least 6 characters.",
      "auth/email-already-in-use": "An account already exists for that email. Try signing in.",
      "auth/invalid-credential": "Email or password is incorrect.",
      "auth/wrong-password": "Email or password is incorrect.",
      "auth/user-not-found": "No account found for that email.",
      "auth/too-many-requests": "Too many attempts, please try again in a bit.",
      "auth/popup-closed-by-user": "Sign-in was cancelled.",
    }[code] || "Something went wrong, please try again.");

    $("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = $("email").value.trim(), password = $("password").value, name = $("name").value.trim();
      msg("");
      if (!email) return msg("Please enter your email.");
      if (!password) return msg("Please enter your password.");
      $("submit").disabled = true; $("submit").textContent = "Please wait…";
      try {
        if (mode === "up") {
          const cred = await createUserWithEmailAndPassword(auth, email, password);
          if (name) { try { await updateProfile(cred.user, { displayName: name }); } catch (_) {} }
        } else {
          await signInWithEmailAndPassword(auth, email, password);
        }
        location.replace(next);
      } catch (err) {
        msg(friendly(err.code));
        $("submit").disabled = false; render();
      }
    });

    $("google").addEventListener("click", async () => {
      msg("");
      try { await signInWithPopup(auth, googleProvider); location.replace(next); }
      catch (err) { msg(friendly(err.code)); }
    });

    $("forgot").addEventListener("click", async () => {
      const email = $("email").value.trim();
      if (!email) return msg("Enter your email above, then tap “Forgot password?”");
      try { await sendPasswordResetEmail(auth, email); msg("Password reset link sent — check your inbox.", true); }
      catch (err) { msg(friendly(err.code)); }
    });

    render();
  </script>
</body>
</html>
