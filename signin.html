<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Manage subscription — Eat.</title>
<meta name="description" content="Manage your Eat subscription. Update your card, switch plans, or cancel anytime." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #fdf8f2; --bg-warm: #f7f0e6; --surface: #ffffff;
    --border: #e8ddd0; --border-2: #ddd0be;
    --brand: #ff6b35; --text-dark: #2d1f0e; --text-mid: #5c3d1e; --muted: #9c8572;
    --green: #2f9e5f;
    --font-serif: "DM Serif Display","Times New Roman",serif;
    --font-sans: "DM Sans",-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text-dark);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;min-height:100dvh;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  ::selection{background:var(--brand);color:#fff}

  .nav{position:sticky;top:0;z-index:50;background:rgba(253,248,242,0.88);backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);border-bottom:1px solid var(--border)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:72px;max-width:1240px;margin:0 auto;padding:0 32px}
  .brand{display:inline-flex;align-items:center;gap:12px;font-family:var(--font-serif);font-size:26px;letter-spacing:-.04em;color:var(--text-dark);line-height:1}
  .brand-mark{width:36px;height:36px;border-radius:9px;background:radial-gradient(circle at 30% 25%,#ffb088 0%,#ff6b35 55%,#e25420 100%);box-shadow:0 6px 16px rgba(255,107,53,.32),0 0 0 1px rgba(0,0,0,.04);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden}
  .brand-mark::after{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.28) 0%,transparent 35%);pointer-events:none}
  .brand-mark span{position:relative;z-index:1;font-family:var(--font-serif);font-style:italic;font-weight:700;color:#fffaf3;font-size:30px;line-height:1;letter-spacing:-.04em;text-shadow:0 2px 8px rgba(120,40,10,.28);transform:translate(0,-1px)}
  .nav-links{display:flex;align-items:center;gap:30px;font-size:15px;font-weight:500}
  .nav-links a:hover{color:var(--brand)}
  .nav-cta{background:var(--text-dark);color:#fdf8f2 !important;display:inline-flex;align-items:center;height:40px;padding:0 18px;border-radius:var(--r-btn);font-weight:500;font-size:14px;box-shadow:0 4px 14px rgba(45,31,14,.18)}
  @media(max-width:720px){.nav-links a:not(.nav-cta){display:none}.nav-inner{padding:0 22px}}

  .main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
  .card{width:100%;max-width:432px;background:var(--surface);border:1px solid var(--border);border-radius:30px;padding:44px 40px 34px;text-align:center;
    box-shadow:0 2px 8px rgba(45,31,14,.06),0 30px 60px -40px rgba(45,31,14,.4)}
  .glow{position:relative;width:74px;height:74px;margin:0 auto 22px}
  .glow::before{content:"";position:absolute;inset:-28%;background:radial-gradient(circle,rgba(255,107,53,.34),transparent 68%);filter:blur(6px)}
  .glow .brand-mark{width:70px;height:70px;border-radius:18px;position:relative}
  .glow .brand-mark span{font-size:56px}
  h1{font-family:var(--font-serif);font-weight:400;font-size:32px;letter-spacing:-.01em;margin:0}
  h1 em{font-style:italic;color:var(--brand)}
  .sub{color:var(--muted);font-size:14.5px;line-height:1.55;margin:10px auto 0;max-width:34ch}

  form{margin-top:26px;text-align:left}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--text-mid);margin-bottom:7px}
  .input{width:100%;height:52px;padding:0 15px;border:1.5px solid var(--border);border-radius:14px;background:var(--surface);font-family:var(--font-sans);font-size:15px;color:var(--text-dark);transition:border-color .15s,box-shadow .15s}
  .input::placeholder{color:#bcae9d}
  .input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(255,107,53,.13)}
  .btn{width:100%;height:54px;margin-top:16px;border:0;border-radius:14px;background:linear-gradient(140deg,var(--brand),#ff7d44);color:#fff;font-family:var(--font-sans);font-weight:600;font-size:16px;cursor:pointer;box-shadow:0 4px 16px rgba(255,107,53,.35);transition:transform .15s,opacity .15s}
  .btn:hover{transform:translateY(-1px)}
  .btn:disabled{opacity:.6;cursor:default;transform:none}
  .msg{font-size:13px;margin-top:14px;text-align:center;line-height:1.5;min-height:16px}
  .msg.ok{color:var(--green)}
  .msg.err{color:#d24b32}
  .alt{margin-top:24px;padding-top:20px;border-top:1px solid var(--border);font-size:13.5px;color:var(--muted);text-align:center}
  .alt a{color:var(--brand);font-weight:600}
  .foot{display:flex;gap:18px;justify-content:center;margin-top:18px;font-size:12.5px;color:var(--muted)}
  @media(max-width:480px){.card{padding:34px 24px 28px}h1{font-size:27px}}
</style>
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="index.html"><span class="brand-mark"><span>e.</span></span></a>
      <nav class="nav-links">
        <a href="pricing.html">Pricing</a>
        <a href="faq.html">FAQ</a>
        <a href="signin.html">Sign in</a>
        <a href="checkout.html" class="nav-cta">Get Eat</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="card">
      <div class="glow"><span class="brand-mark"><span>e.</span></span></div>
      <h1>Manage your <em>subscription.</em></h1>
      <p class="sub">Enter the email you subscribed with and we'll send you a secure link to update your card, switch plans, or cancel.</p>

      <form id="form" novalidate>
        <label for="email">Email address</label>
        <input class="input" type="email" id="email" name="email" placeholder="you@email.com" autocomplete="email"/>
        <button type="submit" class="btn" id="btn">Email me a secure link</button>
        <div class="msg" id="msg"></div>
      </form>

      <div class="alt">New to Eat? <a href="checkout.html">Start your free week →</a></div>
      <div class="foot"><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a><a href="support.html">Help</a></div>
    </div>
  </main>

  <script>
    (function () {
      const WORKER = "https://eat-claude-proxy.mohammed-alsafwani.workers.dev";
      const form = document.getElementById("form");
      const btn = document.getElementById("btn");
      const msg = document.getElementById("msg");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        msg.className = "msg"; msg.textContent = "";
        if (!email || !email.includes("@")) { msg.className = "msg err"; msg.textContent = "Please enter a valid email address."; return; }
        btn.disabled = true; btn.textContent = "Sending…";
        try {
          await fetch(WORKER + "/stripe/portal", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });
          // Always show the same confirmation (we never reveal whether an account exists).
          msg.className = "msg ok";
          msg.textContent = "If that email has a subscription, we've sent a secure manage link. Check your inbox.";
          form.querySelector(".input").value = "";
        } catch (_) {
          msg.className = "msg err"; msg.textContent = "Network error, please try again.";
        }
        btn.disabled = false; btn.textContent = "Email me a secure link";
      });
    })();
  </script>
</body>
</html>
